# ============================================================
# TP2 — Docker Compose
# Stack : Frontend (Nginx) + API (Node.js) + BDD (PostgreSQL)
# ============================================================
#
# Démarrage :  docker compose up --build
# Arrêt     :  docker compose down
# Reset BDD :  docker compose down -v   (supprime le volume)

services:

  # ──────────────────────────────────────────────────────────
  # 1. Base de données PostgreSQL
  # ──────────────────────────────────────────────────────────
  database:
    image: postgres:15-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      # Persistance des données entre les redémarrages
      - pgdata:/var/lib/postgresql/data

    # Healthcheck : l'API ne démarrera qu'une fois la BDD prête
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

    networks:
      - backend

  # ──────────────────────────────────────────────────────────
  # 2. API Node.js
  # ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile

    restart: on-failure

    environment:
      PORT:        ${API_PORT:-3000}
      DB_HOST:     database    # nom du service → résolution DNS Docker
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

    ports:
      # Exposé sur l'hôte pour que le navigateur puisse y accéder
      - "${API_PORT:-3000}:3000"

    # L'API attend que la BDD soit saine avant de démarrer
    depends_on:
      database:
        condition: service_healthy

    networks:
      - backend

  # ──────────────────────────────────────────────────────────
  # 3. Frontend Nginx
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT:-8080}:80"

    # Le frontend démarre après l'API (best-effort, pas de healthcheck)
    depends_on:
      - api

    networks:
      - backend

  # ──────────────────────────────────────────────────────────
  # 4. Interface Adminer
  # ──────────────────────────────────────────────────────────
  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: database
    networks:
      - backend

# ── Réseaux ────────────────────────────────────────────────
networks:
  backend:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────
volumes:
  pgdata:
    # Volume nommé géré par Docker : persiste entre les docker compose down/up
    # Pour tout réinitialiser : docker compose down -v
